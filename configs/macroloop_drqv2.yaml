# Macro-loop overlay — K=5 WM↔policy feedback iterations with a CYCLED
# imag buffer (Option B). The dense MBPO baseline has K=260; here we
# explicitly want a small number of refreshes (matching the cadence of
# foundation-model retraining cycles in the real world).
#
# Original problem (without cycled buffer):
#   With K=5 and a growing imag buffer, the pool gets dominated by
#   stale rollouts of Policy_0. By the end of training the policy is still
#   being gradient-pulled toward Policy_0's behaviour because ~95% of the
#   imag transitions came from that initial policy. Result: SR=0 in all
#   conditions even though K=260 produces SR=0.5 on frozen_wm.
#
# Fix (this file):
#   1. Cap imag_buffer_size to ~6000 transitions (~545 episodes at
#      gen_horizon=10) so the buffer can only hold ONE refresh's worth.
#   2. Each generate_inloop call produces gen_batch=512 episodes which
#      FIFO-evicts the previous refresh's data → buffer is ~94% fresh
#      after each refresh, tracking the current policy.
#   3. init_gen_times=2 just primes the buffer once before the first
#      learning starts.
#
# After this change each "macro-loop iteration" gives the policy ~20 000
# gradient updates on a freshly-generated ~545-episode pool from the
# current policy's behaviour, with 5 such iterations across the run.

gen_every_steps: 10000      # K=5 imag-refresh events post-start_mbpo
gen_batch: 512              # episodes per rollout call → ~512 fresh transitions
init_gen_times: 2           # just prime the buffer; cycled below evicts anyway

# Imag-only buffer cap (transitions, not episodes). 545 episodes × 11
# transitions per ep ≈ 6000 transitions. Real env buffer stays large.
imag_buffer_size: 6000
