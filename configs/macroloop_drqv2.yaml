# Macro-loop overlay — explicit K=5 WM↔policy feedback iterations per run.
#
# Motivation (world-collapse framing):
#   The "foundation-model retraining" story is that a WM trains a policy →
#   policy generates trajectories → those trajectories get reused to retrain
#   the WM → repeat. In the real world this cycle happens a small number of
#   times (model release cadence), not 260+. We bump gen_every_steps so the
#   imag-buffer refresh cycle (the natural feedback bottleneck in MBPO) only
#   fires ~5 times per 100k-frame Phase B run.
#
# What stays the same:
#   - Total WM gradient updates per run (~5 000)
#   - Total policy gradient updates per run (~100 000)
#   - Total env frames (100 000) and real_ratio (0.5)
# What changes:
#   - gen_every_steps: 200 → 10 000 (5 refreshes after start_mbpo instead of 240)
#   - Each "macro-loop" between refreshes now contains:
#       * ~1 000 WM gradient updates (was 20)
#       * ~20 000 policy gradient updates (was 400)
#       * ~10 000 env frames collected (was 200)
#     so the WM and policy each see *many* more updates between successive
#     imag refreshes, matching the "release a new model, train policy on it,
#     wait for trajectories, retrain" cadence.

gen_every_steps: 10000
# Bump imag-buffer size to compensate for fewer refreshes:
#   K=260 baseline: 280 rollout calls × 32 ep = ~9 000 episodes total
#   K=5 + this:     105 rollout calls × 64 ep = ~6 720 episodes total
# Keeps the K=5 macro-loop count (still 5 imag-refresh events) but each call
# generates 64 episodes instead of 32, and the initial burst is 100 not 20.
# Without this, the policy got ~125 updates per imag transition → severe
# overfitting → SR=0 even on frozen_wm.
init_gen_times: 100
gen_batch: 64
