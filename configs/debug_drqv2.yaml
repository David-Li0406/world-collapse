# Smoke-test overlay: tiny budget that exercises every code path quickly.
# Use with --mode round0 (no condition) or --mode online --condition X.

seed: 42
num_train_frames: 3000
num_seed_frames: 200
eval_every_frames: 1000
num_eval_episodes: 2
start_mbpo: 1000
# Match production init step count: a CUDA assert from multinomial(NaN) in
# generate_inloop poisons the whole CUDA context, so subsequent training
# steps die too. wmcollapse's pilot uses 1000 init steps + bf16 autocast
# successfully; fewer than that produces inf logits during generation.
init_update_gen_steps: 1000
init_gen_times: 2
gen_every_steps: 50
update_gen_every_step: 5
update_tokenizer_every_step: 20
batch_size: 32
world_model:
  batch_size: 4
recent_window: 1000
