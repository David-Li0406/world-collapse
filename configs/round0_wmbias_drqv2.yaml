# A-skewed round-0 for Setting 2 (WM-seeded bias).
#
# Same as round0_drqv2.yaml but the real-env data collection OVERSAMPLES region
# A: each episode draws its goal from A (lower goal-x half) with probability
# collect_bias_prob, else from the full goal space. The resulting M_0 is more
# accurate in A than B — the seed for the WM-seeded-bias experiment.
#
# Produces a biased (M_0, buffer). Its policy is also A-biased and is NOT used
# by Setting 2 (which mounts a clean policy from the unbiased setup); but it is
# saved so the shared dir is self-contained.
#
# Build via setup-shared-drqv2 with round0_overlay=round0_wmbias and a distinct
# run_name (e.g. drqv2-wmbiasA).

num_train_frames: 200000
eval_every_frames: 20000
bias_goal: false

collect_bias_prob: 0.8       # 80% of episodes draw the goal from region A
collect_bias_fraction: 0.5   # A = lower goal-x half (must match Phase-B measure split)
