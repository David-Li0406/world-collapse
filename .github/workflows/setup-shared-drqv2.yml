name: setup-shared-drqv2

# One-time setup for the DrQ-v2 + VideoPredictor pipeline.
# Builds the shared probe bank then runs round-0 MBPO. Both outputs are
# promoted to $HOME/wcollapse-shared/drqv2/<run_name>/ on the runner so
# the Phase B workflow can mount them by path without re-doing the work.

on:
  workflow_dispatch:
    inputs:
      run_name:
        description: "Shared setup run name"
        required: true
        default: "drqv2-v1"
      smoke:
        description: "If true, use debug overlay (~10 min instead of ~2-3 h)"
        required: false
        default: "false"

jobs:
  run:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Show machine info
        run: |
          hostname
          nvidia-smi -L || true

      - name: Setup uv environment
        run: |
          export UV_CACHE_DIR="$HOME/.cache/uv"
          uv sync --frozen

      - name: Prepare data
        run: |
          export DATA_ROOT="$HOME/datasets/world-collapse"
          export HF_HOME="$HOME/hf_cache"
          export HF_DATASETS_CACHE="$HOME/hf_cache/datasets"
          export TRANSFORMERS_CACHE="$HOME/hf_cache/transformers"
          export MUJOCO_GL=egl
          export EGL_DEVICE_ID="${CUDA_VISIBLE_DEVICES%%,*}"
          unset PYOPENGL_PLATFORM
          ./scripts/prepare_data.sh

      - name: Stage iVideoGPT pretrained models
        run: |
          export HF_HOME="$HOME/hf_cache"
          DEST="iVideoGPT/pretrained_models/ivideogpt-oxe-64-act-free"
          if [ -f "$DEST/tokenizer/diffusion_pytorch_model.safetensors" ] && \
             [ -f "$DEST/transformer/model.safetensors" ]; then
            echo "pretrained_models already staged at $DEST"
          else
            mkdir -p "$DEST"
            uv run python -c "
          from huggingface_hub import snapshot_download
          path = snapshot_download(repo_id='thuml/ivideogpt-oxe-64-act-free', local_dir='$DEST', local_dir_use_symlinks=True)
          print('Staged to', path)
          "
          fi
          ls -la "$DEST" "$DEST/tokenizer" "$DEST/transformer"

      - name: Probe render backends
        run: |
          NVIDIA_PREFIX=$(ls -d /opt/nvidia-* 2>/dev/null | head -1)
          echo "--- NVIDIA prefix: ${NVIDIA_PREFIX:-MISSING} ---"
          ls -la "${NVIDIA_PREFIX}/lib64/" 2>&1 | grep -iE "egl|gl\." | head -20
          echo "--- libEGL anywhere (looking for glvnd dispatch lib) ---"
          (find /usr /opt /etc /lib -maxdepth 6 -name "libEGL.so*" 2>/dev/null || true) | head -20
          echo "--- libGLdispatch (glvnd marker) ---"
          (find /usr /opt /etc /lib -maxdepth 6 -name "libGLdispatch*" 2>/dev/null || true) | head -10
          echo "--- All EGL ICD configs ---"
          ls -la /usr/share/glvnd/egl_vendor.d/ /etc/glvnd/egl_vendor.d/ 2>&1 || echo "no glvnd dirs"
          cat "${NVIDIA_PREFIX}/egl_vendor.d/10_nvidia.json" 2>&1 || echo "(no nvidia ICD json)"
          echo "--- libOSMesa anywhere ---"
          (find /usr /opt /etc /lib -maxdepth 6 -name "libOSMesa*" 2>/dev/null || true) | head -10
          echo "--- ldconfig EGL entries ---"
          ldconfig -p 2>/dev/null | grep -iE "egl|osmesa|glvnd" | head -20
          echo "--- DRI render nodes + groups ---"
          ls -la /dev/dri/ 2>&1 || echo "no /dev/dri"
          id; getent group video render 2>&1 || true
          echo "--- nvidia-smi driver ---"
          nvidia-smi --query-gpu=driver_version --format=csv,noheader 2>&1 | head -1
          echo "--- /dev/nvidia* ---"
          ls -la /dev/nvidia* 2>&1 || echo "no /dev/nvidia* devices"
          echo "--- libEGL.so.1 deps (glvnd marker = depends on libGLdispatch) ---"
          ldd /usr/lib64/libEGL.so.1 2>&1 | head -10
          echo "--- eglinfo if available ---"
          which eglinfo 2>&1 || echo "no eglinfo"
          NVIDIA_PREFIX=$(ls -d /opt/nvidia-* 2>/dev/null | head -1)
          if [ -n "$NVIDIA_PREFIX" ]; then
            echo "--- NVIDIA lib64 full listing (find deps) ---"
            ls -la "${NVIDIA_PREFIX}/lib64/" 2>&1 | head -50
            echo "--- ldd libEGL_nvidia.so.0 (need ALL deps resolved) ---"
            ldd "${NVIDIA_PREFIX}/lib64/libEGL_nvidia.so.0" 2>&1 | head -30
            echo "--- ldd libEGL_nvidia.so.0 with LD_LIBRARY_PATH ---"
            LD_LIBRARY_PATH="${NVIDIA_PREFIX}/lib64:${LD_LIBRARY_PATH:-}" ldd "${NVIDIA_PREFIX}/lib64/libEGL_nvidia.so.0" 2>&1 | head -30
            echo "--- minimal EGL device-init probe via NVIDIA ICD (with glvnd debug) ---"
            export LD_LIBRARY_PATH="${NVIDIA_PREFIX}/lib64:${LD_LIBRARY_PATH:-}"
            export __EGL_VENDOR_LIBRARY_FILENAMES="${NVIDIA_PREFIX}/egl_vendor.d/10_nvidia.json"
            export __EGL_VENDOR_LIBRARY_DIRS="${NVIDIA_PREFIX}/egl_vendor.d"
            export EGL_LOG_LEVEL=debug
            export LIBGL_DEBUG=verbose
            uv run python - <<'PY' 2>&1 || true
          import os, ctypes
          for k in ("LD_LIBRARY_PATH", "__EGL_VENDOR_LIBRARY_FILENAMES", "__EGL_VENDOR_LIBRARY_DIRS"):
              print(f"{k}=", os.environ.get(k))
          # Pre-load NVIDIA ICD directly to surface any dep-resolution error.
          try:
              nv = ctypes.cdll.LoadLibrary("/opt/nvidia-535.274.02/lib64/libEGL_nvidia.so.0")
              print("libEGL_nvidia.so.0 direct dlopen OK:", nv)
          except OSError as e:
              print("libEGL_nvidia.so.0 direct dlopen FAIL:", e)
          egl = ctypes.cdll.LoadLibrary("libEGL.so.1")
          egl.eglQueryString.restype = ctypes.c_char_p
          print("EGL_VERSION (no display):", egl.eglQueryString(0, 0x3054))
          print("EGL_EXTENSIONS (client) :", egl.eglQueryString(0, 0x3055))
          PY
          fi

      - name: Build probe bank
        shell: bash -eo pipefail {0}
        run: |
          export HF_HOME="$HOME/hf_cache"
          export TRANSFORMERS_CACHE="$HOME/hf_cache/transformers"
          export CUDA_VISIBLE_DEVICES="${CUDA_VISIBLE_DEVICES:-4}"
          export MUJOCO_GL=egl
          # CUDA_VISIBLE_DEVICES already restricts visibility to one GPU; EGL
          # enumerates that GPU at index 0 inside the process. Setting
          # EGL_DEVICE_ID to the global GPU index is out-of-range.
          export EGL_DEVICE_ID=0
          unset PYOPENGL_PLATFORM
          # NVIDIA EGL ICD lives under /opt/nvidia-* on this runner; put its lib
          # dir on LD_LIBRARY_PATH and point glvnd at the right ICD JSON so
          # mujoco's EGL device-mode resolves NVIDIA's libEGL_nvidia (rather
          # than Mesa, which needs /dev/dri/card* the runner can't open).
          NVIDIA_PREFIX=$(ls -d /opt/nvidia-* 2>/dev/null | head -1)
          if [ -n "$NVIDIA_PREFIX" ]; then
            export LD_LIBRARY_PATH="${NVIDIA_PREFIX}/lib64:/usr/lib64:${LD_LIBRARY_PATH:-}"
            export __EGL_VENDOR_LIBRARY_FILENAMES="${NVIDIA_PREFIX}/egl_vendor.d/10_nvidia.json"
            export __EGL_VENDOR_LIBRARY_DIRS="${NVIDIA_PREFIX}/egl_vendor.d"
            export __GLX_VENDOR_LIBRARY_NAME=nvidia
            # LD_PRELOAD primes the in-process ICD before any Python import.
            # The probe step showed glvnd dispatches NVIDIA only when the ICD
            # is already in-process; preloading guarantees that.
            export LD_PRELOAD="${NVIDIA_PREFIX}/lib64/libEGL_nvidia.so.0${LD_PRELOAD:+:$LD_PRELOAD}"
            echo "Using NVIDIA EGL from $NVIDIA_PREFIX (LD_PRELOAD primed)"
          fi
          # Diagnostic: confirm mujoco can import + render before we burn time on probe collection.
          uv run python -c "
          import os
          print('MUJOCO_GL=', os.environ.get('MUJOCO_GL'))
          print('EGL_DEVICE_ID=', os.environ.get('EGL_DEVICE_ID'))
          print('CUDA_VISIBLE_DEVICES=', os.environ.get('CUDA_VISIBLE_DEVICES'))
          print('__EGL_VENDOR_LIBRARY_FILENAMES=', os.environ.get('__EGL_VENDOR_LIBRARY_FILENAMES'))
          import mujoco
          print('mujoco version', mujoco.__version__)
          import metaworld
          bench = metaworld.MT1('push-v3', seed=0)
          env_cls = bench.train_classes['push-v3']
          env = env_cls(render_mode='rgb_array', camera_name='corner', height=64, width=64)
          task = next(t for t in bench.train_tasks if t.env_name == 'push-v3')
          env.set_task(task); env.reset()
          frame = env.render()
          print('render OK; shape', getattr(frame, 'shape', None))
          "
          export PYTHONUNBUFFERED=1
          export PYTHONPATH="src:iVideoGPT/mbrl:iVideoGPT:${PYTHONPATH:-}"
          export IVIDEOGPT_ROOT="$PWD/iVideoGPT"

          OUT="runs/${{ inputs.run_name }}"
          mkdir -p "$OUT"

          if [ "${{ inputs.smoke }}" = "true" ]; then
            N_EPS=20; N_PROBES=24
          else
            N_EPS=100; N_PROBES=192
          fi

          uv run python -u scripts/build_probe_bank.py \
            --task push-v3 \
            --n_seed_episodes "$N_EPS" \
            --n_probes "$N_PROBES" \
            --horizon 15 \
            --seed 42 \
            --output "$OUT/probe_bank.h5" \
            2>&1 | tee "$OUT/probe_bank.log"

      - name: Round-0 MBPO
        shell: bash -eo pipefail {0}
        run: |
          export HF_HOME="$HOME/hf_cache"
          export TRANSFORMERS_CACHE="$HOME/hf_cache/transformers"
          export CUDA_VISIBLE_DEVICES="${CUDA_VISIBLE_DEVICES:-4}"
          export MUJOCO_GL=egl
          # CUDA_VISIBLE_DEVICES already restricts visibility to one GPU; EGL
          # enumerates that GPU at index 0 inside the process. Setting
          # EGL_DEVICE_ID to the global GPU index is out-of-range.
          export EGL_DEVICE_ID=0
          unset PYOPENGL_PLATFORM
          NVIDIA_PREFIX=$(ls -d /opt/nvidia-* 2>/dev/null | head -1)
          if [ -n "$NVIDIA_PREFIX" ]; then
            export LD_LIBRARY_PATH="${NVIDIA_PREFIX}/lib64:${LD_LIBRARY_PATH:-}"
            export __EGL_VENDOR_LIBRARY_FILENAMES="${NVIDIA_PREFIX}/egl_vendor.d/10_nvidia.json"
            export __GLX_VENDOR_LIBRARY_NAME=nvidia
          fi
          export PYTHONUNBUFFERED=1
          export PYTHONPATH="src:iVideoGPT/mbrl:iVideoGPT:${PYTHONPATH:-}"
          export IVIDEOGPT_ROOT="$PWD/iVideoGPT"
          export CUDA_VISIBLE_DEVICES="${CUDA_VISIBLE_DEVICES:-4}"

          OUT="runs/${{ inputs.run_name }}/round0"
          mkdir -p "$OUT"

          TMP_CFG="$(mktemp -t drqv2_round0.XXXXXX.yaml)"
          if [ "${{ inputs.smoke }}" = "true" ]; then
            uv run python -c "
          from omegaconf import OmegaConf
          base = OmegaConf.load('configs/drqv2_base.yaml')
          o1 = OmegaConf.load('configs/round0_drqv2.yaml')
          o2 = OmegaConf.load('configs/debug_drqv2.yaml')
          OmegaConf.save(OmegaConf.merge(base, o1, o2), '${TMP_CFG}')"
          else
            uv run python -c "
          from omegaconf import OmegaConf
          base = OmegaConf.load('configs/drqv2_base.yaml')
          o1 = OmegaConf.load('configs/round0_drqv2.yaml')
          OmegaConf.save(OmegaConf.merge(base, o1), '${TMP_CFG}')"
          fi

          uv run python -u -m wcollapse.training.online_drqv2 \
            --mode round0 \
            --config "${TMP_CFG}" \
            --output_dir "$OUT" \
            2>&1 | tee "$OUT/train.log"

          rm -f "${TMP_CFG}"

      - name: Promote to shared dir
        shell: bash -eo pipefail {0}
        run: |
          SHARED="$HOME/wcollapse-shared/drqv2/${{ inputs.run_name }}"
          rm -rf "$SHARED"
          mkdir -p "$(dirname "$SHARED")"
          cp -r "runs/${{ inputs.run_name }}" "$SHARED"
          echo "[setup-shared-drqv2] persistent copy at $SHARED"
          ls -la "$SHARED"
          ls -la "$SHARED/round0"

      - name: Write summary
        if: always()
        run: |
          {
            echo "## Setup summary"
            echo "- Run name: ${{ inputs.run_name }}"
            echo "- Smoke: ${{ inputs.smoke }}"
            echo "- Shared dir: \$HOME/wcollapse-shared/drqv2/${{ inputs.run_name }}"
            echo "- Commit: $(git rev-parse HEAD)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload metadata
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.run_name }}
          path: |
            runs/${{ inputs.run_name }}/probe_bank.log
            runs/${{ inputs.run_name }}/round0/train.log
            runs/${{ inputs.run_name }}/round0/metrics.jsonl
            runs/${{ inputs.run_name }}/round0/config.yaml
