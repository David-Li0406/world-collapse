name: env-diag

# Diagnose the main-env slowdown after the machine reset: torch CUDA, GPU vs CPU
# compute, package versions (missing?), and push-v3 per-step render timing.

on:
  workflow_dispatch:
    inputs:
      gpu:
        description: "GPU id"
        required: false
        default: "0"
      python_version:
        description: "Pin uv to this Python (e.g. 3.11 = pre-reset known-good). Empty = uv default."
        required: false
        default: ""
      mujoco_version:
        description: "Override mujoco version after uv sync (e.g. 3.1.6) to test render-path regression. Empty = pinned 3.3.0."
        required: false
        default: ""

jobs:
  run:
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 30
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup uv environment
        run: |
          export UV_CACHE_DIR="$HOME/.cache/uv"
          export PATH="$HOME/.local/bin:$HOME/.cargo/bin:$HOME/bin:$PATH"
          if ! command -v uv >/dev/null 2>&1; then
            curl -LsSf https://astral.sh/uv/install.sh | sh
            export PATH="$HOME/.local/bin:$PATH"
          fi
          uv --version
          PYARG=""
          if [ -n "${{ inputs.python_version }}" ]; then PYARG="--python ${{ inputs.python_version }}"; fi
          uv sync --frozen $PYARG
          if [ -n "${{ inputs.mujoco_version }}" ]; then
            echo "[diag] overriding mujoco -> ${{ inputs.mujoco_version }}"
            # --no-deps + --reinstall to bypass the editable project's mujoco==3.3.0 pin.
            uv pip install --no-deps --reinstall "mujoco==${{ inputs.mujoco_version }}"
          fi
          echo "[diag] venv python: $(uv run $PYARG python -c 'import sys;print(sys.version)')"
          echo "[diag] mujoco: $(uv run $PYARG python -c 'import mujoco;print(mujoco.__version__)')"

      - name: GPU state (clocks / throttle / MIG / persistence)
        run: |
          echo "=== persistence + MIG ==="
          nvidia-smi --query-gpu=index,name,persistence_mode,mig.mode.current,clocks.sm,clocks.max.sm,clocks_throttle_reasons.active,utilization.gpu,power.draw,power.limit --format=csv 2>&1 | head -12 || true
          echo "=== throttle reasons (GPU 0) ==="
          nvidia-smi -q -i 0 -d PERFORMANCE 2>&1 | grep -iE 'clocks throttle|idle|applic|sw power|hw |sw therm|hw therm|sync boost' | head -20 || true

      - name: EGL per-device render benchmark
        shell: bash -eo pipefail {0}
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          export HF_HOME="$HOME/hf_cache"
          export MUJOCO_GL=egl
          export PYOPENGL_PLATFORM=egl
          NVIDIA_PREFIX=$(ls -d /opt/nvidia-* 2>/dev/null | head -1)
          if [ -n "$NVIDIA_PREFIX" ]; then
            export LD_LIBRARY_PATH="${NVIDIA_PREFIX}/lib64:/usr/lib64:${LD_LIBRARY_PATH:-}"
            export __EGL_VENDOR_LIBRARY_FILENAMES="${NVIDIA_PREFIX}/egl_vendor.d/10_nvidia.json"
            unset __EGL_VENDOR_LIBRARY_DIRS
          fi
          export PYTHONUNBUFFERED=1
          export PYTHONPATH="src:iVideoGPT/mbrl:iVideoGPT:${PYTHONPATH:-}"
          # NOTE: no CUDA_VISIBLE_DEVICES restriction here, so the probe can see
          # all EGL devices and benchmark each physical GPU's render speed.
          PYARG=""
          if [ -n "${{ inputs.python_version }}" ]; then PYARG="--python ${{ inputs.python_version }}"; fi
          uv run $PYARG python -u scripts/egl_device_bench.py || true

      - name: Run diagnostic
        shell: bash -eo pipefail {0}
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          export HF_HOME="$HOME/hf_cache"
          export MUJOCO_GL=egl
          export PYOPENGL_PLATFORM=egl
          NVIDIA_PREFIX=$(ls -d /opt/nvidia-* 2>/dev/null | head -1)
          if [ -n "$NVIDIA_PREFIX" ]; then
            export LD_LIBRARY_PATH="${NVIDIA_PREFIX}/lib64:/usr/lib64:${LD_LIBRARY_PATH:-}"
            export __EGL_VENDOR_LIBRARY_FILENAMES="${NVIDIA_PREFIX}/egl_vendor.d/10_nvidia.json"
            unset __EGL_VENDOR_LIBRARY_DIRS
          fi
          export PYTHONUNBUFFERED=1
          export PYTHONPATH="src:iVideoGPT/mbrl:iVideoGPT:${PYTHONPATH:-}"
          export IVIDEOGPT_ROOT="$PWD/iVideoGPT"
          PYARG=""
          if [ -n "${{ inputs.python_version }}" ]; then PYARG="--python ${{ inputs.python_version }}"; fi
          CUDA_VISIBLE_DEVICES="${{ inputs.gpu }}" MUJOCO_EGL_DEVICE_ID=0 \
            uv run $PYARG python -u scripts/main_env_diag.py
